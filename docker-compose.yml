services:
  api:
    build:
      context: apps/api
      dockerfile: Dockerfile
      target: dev
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:///./data/zoom.db
      CORS_ORIGINS: http://localhost:3000
      DEFAULT_USER_ID: "1"
    volumes:
      # Persist SQLite data across container restarts
      - api_data:/app/data

  web:
    build:
      # Repo root is required so the Dockerfile can access pnpm workspace files
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    ports:
      - "3000:3000"
    environment:
      # Browser-facing URLs must use localhost (browser runs on host, not in Docker network)
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    depends_on:
      - api

volumes:
  api_data:
