services:
  - type: web
    name: zoom-clone-api
    runtime: python
    plan: free
    rootDir: apps/api
    # Render auto-enables uv when uv.lock is present in rootDir.
    buildCommand: uv sync
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: CORS_ORIGINS
        # Browser origins allowed to call the API (comma-separated, no trailing slashes).
        # Example: https://zoom-clone-web-brown.vercel.app,http://localhost:3000
        sync: false
      - key: FRONTEND_URL
        # Used when generating invite links stored in the database.
        # Example: https://zoom-clone-web-brown.vercel.app
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./data/zoom.db
      - key: DEFAULT_USER_ID
        value: "1"
    # Free-tier limitation: Render's free web services use an ephemeral
    # filesystem. SQLite data is lost on every redeploy or restart; seed.py
    # runs automatically on startup. Persistent disk is a paid Render feature.
